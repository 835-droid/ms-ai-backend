<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-AI | الإدارة</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="page-shell">
        <section class="page-card">
            <div class="page-header">
                <div>
                    <h1>لوحة الإدارة</h1>
                    <p>إضافة مانجا وفصول بروابط الصور</p>
                </div>
                <div class="header-actions">
                    <a href="control.html" class="btn btn-secondary">العودة</a>
                    <button id="logout-button" class="btn btn-danger">تسجيل الخروج</button>
                </div>
            </div>

            <div id="admin-message" class="message"></div>

            <div class="tabs">
                <button type="button" class="tab-button active" data-tab="manga">إضافة مانجا</button>
                <button type="button" class="tab-button" data-tab="chapters">إدارة الفصول</button>
            </div>

            <div id="tab-manga" class="tab-content active">
                <form id="add-manga-form" class="form-grid">
                    <div class="form-group">
                        <label for="manga-title">عنوان المانجا</label>
                        <input id="manga-title" type="text" required>
                    </div>

                    <div class="form-group">
                        <label for="manga-description">وصف المانجا</label>
                        <textarea id="manga-description" rows="5" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="manga-cover-url">رابط صورة الغلاف</label>
                        <input id="manga-cover-url" type="text" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label for="manga-tags-input">العلامات</label>
                        <input id="manga-tags-input" type="text" placeholder="اكتب علامة ثم Enter">
                        <div id="tags-container" class="tags-wrap"></div>
                    </div>

                    <button id="add-manga-button" class="btn btn-primary" type="submit">إضافة المانجا</button>
                </form>
            </div>

            <div id="tab-chapters" class="tab-content">
                <div class="admin-layout">
                    <div class="admin-panel">
                        <div class="form-group">
                            <label for="chapter-manga-id">اختر المانجا</label>
                            <select id="chapter-manga-id"></select>
                        </div>

                        <form id="add-chapter-form" class="form-grid">
                            <div class="form-group">
                                <label for="chapter-title">عنوان الفصل</label>
                                <input id="chapter-title" type="text" required>
                            </div>

                            <div class="form-group">
                                <label for="chapter-number">رقم الفصل</label>
                                <input id="chapter-number" type="number" min="1" required>
                            </div>

                            <div class="form-group">
                                <label for="chapter-urls">روابط الصور</label>
                                <textarea id="chapter-urls" rows="8" placeholder="رابط كل صورة في سطر"></textarea>
                            </div>

                            <button id="add-chapter-button" class="btn btn-success" type="submit">إضافة الفصل</button>
                        </form>
                    </div>

                    <div class="admin-panel">
                        <h2>الفصول الحالية</h2>
                        <div id="admin-chapter-list" class="admin-list"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.querySelectorAll('[data-tab]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            });
        });
    </script>
</body>
</html>
