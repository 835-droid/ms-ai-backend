<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-AI | الروايات</title>
    <link rel="stylesheet" href="css/base.css?v=20260403-dark">
    <link rel="stylesheet" href="css/modern.css?v=20260403-dark">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/manga.css">
    <link rel="stylesheet" href="css/animations.css">
    <!-- Font Awesome 6 (مجاني) للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-brand"><i class="fas fa-book"></i> MS-AI</a>
        <button class="navbar-toggle" title="تبديل القائمة"><i class="fas fa-bars"></i></button>
        <ul class="navbar-menu">
            <li><a href="dashboard.html"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li><a href="library.html"><i class="fas fa-book"></i> المكتبة</a></li>
            <li><a href="novels.html" class="active"><i class="fas fa-scroll"></i> الروايات</a></li>
            <li><a href="favorites.html"><i class="fas fa-heart"></i> المفضلة</a></li>
            <li><a href="history.html"><i class="fas fa-history"></i> السجل</a></li>
            <li><a href="https://discord.gg/6tTdAh4JVd" target="_blank" rel="noopener noreferrer"><i class="fab fa-discord"></i> ديسكورد</a></li>
        </ul>
        <div class="navbar-right">
            <button class="dark-mode-toggle"></button>
            <button id="logout-button" class="btn btn-sm btn-danger" title="تسجيل الخروج"><i class="fas fa-sign-out-alt"></i></button>
            <a href="profile.html" class="navbar-user-badge" title="الملف الشخصي">
                <span id="user-display-name">مستخدم</span>
                <div class="navbar-user-avatar">US</div>
            </a>
        </div>
    </nav>

    <main class="page-shell">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-content">
                <h1><i class="fas fa-scroll"></i> عالم الروايات</h1>
                <p>اكتشف أفضل الروايات العربية والعالمية</p>
            </div>
        </section>

        <!-- Filters & Search -->
        <section class="page-card">
            <div class="filters-header">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="ابحث عن رواية..." class="form-input">
                    <button id="search-btn" class="btn btn-primary"><i class="fas fa-search"></i></button>
                </div>
                <div class="filter-controls">
                    <select id="sort-select" class="form-select">
                        <option value="newest">الأحدث</option>
                        <option value="popular">الأكثر شعبية</option>
                        <option value="rated">الأعلى تقييمًا</option>
                        <option value="views">الأكثر مشاهدة</option>
                    </select>
                    <select id="genre-select" class="form-select">
                        <option value="">جميع التصنيفات</option>
                        <option value="رومانسية">رومانسية</option>
                        <option value="خيال">خيال</option>
                        <option value="إثارة">إثارة</option>
                        <option value="تاريخية">تاريخية</option>
                        <option value="دراما">دراما</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Quick Access Tabs -->
        <section class="page-card">
            <div class="tabs">
                <button class="tab active" data-tab="all">الكل</button>
                <button class="tab" data-tab="popular">الأكثر شعبية</button>
                <button class="tab" data-tab="recent">المحدثة حديثًا</button>
                <button class="tab" data-tab="top-rated">الأعلى تقييمًا</button>
            </div>
        </section>

        <!-- Novels Grid -->
        <section class="page-card">
            <div id="novels-grid" class="manga-grid">
                <!-- Novels will be loaded here -->
            </div>
            <div id="loading-state" class="loading-state" style="display: none;">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>جاري تحميل الروايات...</p>
            </div>
            <div id="empty-state" class="empty-state" style="display: none;">
                <i class="fas fa-book fa-3x"></i>
                <p>لا توجد روايات متاحة حاليًا</p>
            </div>
        </section>

        <!-- Pagination -->
        <section class="page-card">
            <div id="pagination" class="pagination">
                <!-- Pagination will be generated here -->
            </div>
        </section>
    </main>

    <script src="js/config.js?v=20260402"></script>
    <script src="js/auth.js?v=20260402"></script>
    <script src="js/api.js?v=20260402"></script>
    <script src="js/toast.js?v=20260402"></script>
    <script src="js/common.js?v=20260402"></script>
    <script src="js/novels.js?v=20260404"></script>
</body>
</html>
