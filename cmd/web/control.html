<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-AI | لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* أنماط إضافية خاصة بلوحة التحكم */
        .control-card {
            max-width: 600px;
        }
        .feature-list {
            list-style: none;
            padding: 0;
            text-align: right;
            margin-bottom: 30px;
        }
        .feature-list li {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            font-size: 1.1em;
            color: #495057;
            transition: background-color 0.3s;
        }
        .feature-list li:hover {
            background-color: #e2e6ea;
        }
        .nav-links {
            text-align: center;
            margin-top: 30px;
        }
        .nav-links a {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .nav-links a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card control-card">
            <h2>مرحباً بك في MS-AI</h2>
            <p style="color: #6c757d; font-size: 1.1em;">
                لوحة التحكم الرئيسية - اختر ما تريد القيام به:
            </p>

            <ul class="feature-list">
                <li><a href="dashboard.html" style="color: inherit; text-decoration: none;">📚 تصفح المانجا</a></li>
                <li id="admin-link-li" style="display: none; background-color: #ffc107;">
                    <a href="admin.html" style="color: #333; text-decoration: none; font-weight: bold;">⚙️ لوحة الإدارة (للمسؤولين)</a>
                </li>
                <li>👤 ملف البروفايل والإعدادات (قيد التطوير)</li>
                <li>المزيد من المزايا الحصرية قريباً...</li>
            </ul>

            <div class="nav-links">
                <button id="logout-button" style="background-color: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">تسجيل الخروج</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>

    <script>
        // 🎯 بوابة الأمان
        checkAuthentication();

        // إظهار رابط لوحة الإدارة عبر طلب API
        fetch('/api/admin/check', {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + getAccessToken()
            }
        }).then(response => {
            if (response.ok) {
                const adminLink = document.getElementById('admin-link-li');
                if (adminLink) {
                    adminLink.style.display = 'list-item';
                }
            }
        }).catch(err => {
            console.log('Admin check failed:', err);
        });
    </script>
</body>
</html>
