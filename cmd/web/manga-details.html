<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-AI | تفاصيل المانجا</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* أنماط خاصة بصفحة تفاصيل المانجا */
        .manga-details {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .manga-header {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .manga-cover-large {
            width: 250px;
            height: 350px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .manga-cover-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .manga-info-large {
            flex: 1;
        }

        .manga-title-large {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .manga-description-large {
            font-size: 1.1em;
            line-height: 1.6;
            color: #666;
            margin-bottom: 20px;
        }

        .manga-meta-large {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #999;
        }

        .manga-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tag {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #666;
        }

        .chapters-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .chapters-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chapters-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }

        .chapters-grid {
            display: grid;
            gap: 15px;
        }

        .chapter-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .chapter-card:hover {
            background: #e9ecef;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .chapter-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chapter-number {
            background: #007bff;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1em;
        }

        .chapter-details h3 {
            margin: 0;
            font-size: 1.2em;
            color: #333;
        }

        .chapter-details p {
            margin: 5px 0 0 0;
            color: #666;
            font-size: 0.9em;
        }

        .chapter-actions {
            display: flex;
            gap: 10px;
        }

        .btn-read {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .btn-read:hover {
            background: #218838;
        }

        .nav-bar {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-bar h2 {
            margin: 0;
            color: #333;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-links a, .nav-links button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .nav-links a:hover, .nav-links button:hover {
            background: #0056b3;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #dc3545;
        }

        @media (max-width: 768px) {
            .manga-header {
                flex-direction: column;
                text-align: center;
            }

            .manga-cover-large {
                width: 200px;
                height: 280px;
            }

            .manga-title-large {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="manga-details">
            <div class="nav-bar">
                <h2>📖 تفاصيل المانجا</h2>
                <div class="nav-links">
                    <a href="dashboard.html">العودة للمكتبة</a>
                    <button id="logout-button">تسجيل الخروج</button>
                </div>
            </div>

            <div id="manga-content">
                <div class="loading">جاري تحميل تفاصيل المانجا...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>

    <script>
        // 🎯 بوابة الأمان
        checkAuthentication('index.html');

        // الحصول على معرف المانجا من URL
        const urlParams = new URLSearchParams(window.location.search);
        const mangaId = urlParams.get('id');

        if (!mangaId) {
            document.getElementById('manga-content').innerHTML =
                '<div class="error">معرف المانجا غير صحيح</div>';
        } else {
            loadMangaDetails(mangaId);
        }

        // تحميل تفاصيل المانجا
        async function loadMangaDetails(id) {
            try {
                const [mangaResponse, chaptersResponse] = await Promise.all([
                    fetch(`/api/mangas/${id}`, {
                        method: 'GET',
                        headers: {
                            'Authorization': 'Bearer ' + getAccessToken()
                        }
                    }),
                    fetch(`/api/mangas/${id}/chapters`, {
                        method: 'GET',
                        headers: {
                            'Authorization': 'Bearer ' + getAccessToken()
                        }
                    })
                ]);

                if (!mangaResponse.ok) {
                    throw new Error('فشل في تحميل تفاصيل المانجا');
                }

                const manga = await mangaResponse.json();
                const chapters = chaptersResponse.ok ? await chaptersResponse.json() : { chapters: [] };

                displayMangaDetails(manga, chapters.chapters || []);
            } catch (error) {
                console.error('Error loading manga details:', error);
                document.getElementById('manga-content').innerHTML =
                    '<div class="error">حدث خطأ في تحميل تفاصيل المانجا. يرجى المحاولة لاحقاً.</div>';
            }
        }

        function displayMangaDetails(manga, chapters) {
            const container = document.getElementById('manga-content');

            const coverContent = manga.cover_image
                ? `<img src="${manga.cover_image}" alt="${manga.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
                : '';
            const fallbackContent = `<div style="width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 2em; font-weight: bold;">${manga.title.charAt(0).toUpperCase()}</div>`;

            const tagsHtml = (manga.tags || []).map(tag =>
                `<span class="tag">${tag}</span>`
            ).join('');

            const chaptersHtml = chapters.map(chapter => `
                <div class="chapter-card" onclick="readChapter('${chapter.id}')">
                    <div class="chapter-info">
                        <div class="chapter-number">${chapter.number}</div>
                        <div class="chapter-details">
                            <h3>${chapter.title}</h3>
                            <p>تم النشر: ${new Date(chapter.created_at).toLocaleDateString('ar-SA')}</p>
                        </div>
                    </div>
                    <div class="chapter-actions">
                        <button class="btn-read" onclick="event.stopPropagation(); readChapter('${chapter.id}')">قراءة</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="manga-header">
                    <div class="manga-cover-large">
                        ${coverContent}
                        ${fallbackContent}
                    </div>
                    <div class="manga-info-large">
                        <h1 class="manga-title-large">${manga.title}</h1>
                        <p class="manga-description-large">${manga.description || 'لا يوجد وصف'}</p>
                        <div class="manga-meta-large">
                            <span>الحالة: ${manga.is_published ? 'منشور' : 'مسودة'}</span>
                            <span>الفصول: ${chapters.length}</span>
                            <span>تم الإنشاء: ${new Date(manga.created_at).toLocaleDateString('ar-SA')}</span>
                        </div>
                        ${tagsHtml ? `<div class="manga-tags">${tagsHtml}</div>` : ''}
                    </div>
                </div>

                <div class="chapters-section">
                    <div class="chapters-header">
                        <h2 class="chapters-title">الفصول (${chapters.length})</h2>
                    </div>
                    <div class="chapters-grid">
                        ${chapters.length > 0 ? chaptersHtml : '<p style="text-align: center; color: #666; padding: 40px;">لا توجد فصول متاحة حالياً</p>'}
                    </div>
                </div>
            `;
        }

        function readChapter(chapterId) {
            // TODO: تنفيذ قراءة الفصل
            showNotification('قراءة الفصل قيد التطوير', 'info');
        }

        // تحميل المانجا عند تحميل الصفحة
        window.onload = function() {
            setupAuthListeners();
        };
    </script>
</body>
</html>
