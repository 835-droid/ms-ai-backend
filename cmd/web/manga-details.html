<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-AI | تفاصيل المانجا</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/modern.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/manga.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/details-enhanced.css">
    <!-- Font Awesome 6 (مجاني) للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-brand"><i class="fas fa-book"></i> MS-AI</a>
        <button class="navbar-toggle" title="تبديل القائمة"><i class="fas fa-bars"></i></button>
        <ul class="navbar-menu"><li><a href="dashboard.html"><i class="fas fa-home"></i> الرئيسية</a></li><li><a href="library.html"><i class="fas fa-book"></i> المكتبة</a></li><li><a href="favorites.html"><i class="fas fa-heart"></i> المفضلة</a></li><li><a href="profile.html"><i class="fas fa-user"></i> الملف الشخصي</a></li><li><a href="https://discord.gg/6tTdAh4JVd" target="_blank" rel="noopener noreferrer"><i class="fab fa-discord"></i> ديسكورد</a></li></ul>
        <div class="navbar-right"><button class="dark-mode-toggle"></button><button id="logout-button" class="btn btn-sm btn-danger" title="تسجيل الخروج"><i class="fas fa-sign-out-alt"></i></button><div class="navbar-user-badge"><span id="user-display-name">مستخدم</span><div class="navbar-user-avatar">US</div></div></div>
    </nav>

    <main class="page-shell">
        <section class="page-card details-card">
            <div class="page-header">
                <div>
                    <h1 id="manga-title-header">تفاصيل المانجا</h1>
                    <p id="manga-subtitle">عرض الوصف والفصول والإحصائيات</p>
                </div>
            </div>

            <div id="details-message" class="message" style="display:none;"></div>

            <!-- منطقة المحتوى الرئيسي -->
            <div id="manga-details" class="details-enhanced"></div>

            <!-- زر متابعة القراءة -->
            <div id="resume-reading-container" style="margin:1.5rem 0;"></div>

            <!-- قسم الفصول المحسن -->
            <div id="chapters-container" class="chapters-wrap-enhanced"></div>
        </section>

        <!-- قسم التعليقات -->
        <section class="page-card comments-section-card" style="margin-top: 2rem;">
            <div class="comments-header">
                <h2 class="section-title"><i class="fas fa-comments"></i> التعليقات</h2>
                <div class="comments-controls">
                    <select id="comments-sort" class="form-select">
                        <option value="newest">الأحدث أولاً</option>
                        <option value="oldest">الأقدم أولاً</option>
                    </select>
                </div>
            </div>
            <div id="comments-container">
                <div id="add-comment-form" class="comment-form" style="display:none;">
                    <textarea id="comment-content" placeholder="اكتب تعليقك هنا..." rows="3" maxlength="1000"></textarea>
                    <div class="comment-actions">
                        <button id="submit-comment" class="btn btn-primary">إرسال</button>
                        <button id="cancel-comment" class="btn btn-secondary">إلغاء</button>
                    </div>
                </div>
                <button id="show-comment-form" class="btn btn-secondary" style="margin-bottom: 1rem;"><i class="fas fa-plus"></i> أضف تعليق</button>
                <div id="comments-list" class="comments-list"></div>
                <div id="comments-loading" class="loading-state" style="display:none;">جاري تحميل التعليقات...</div>
                <div id="comments-empty" class="empty-state" style="display:none;">لا توجد تعليقات بعد. كن أول من يعلق!</div>
            </div>
        </section>

        <!-- قسم المانجا المشابهة -->
        <section class="page-card recommendations-section-card" style="margin-top: 2rem;">
            <h2 class="section-title"><i class="fas fa-star"></i> قد يعجبك أيضاً</h2>
            <div id="recommendations-grid" class="manga-grid recommendations-grid"></div>
        </section>
    </main>

    <!-- مودال معرض الصور (اختياري) -->
    <div id="gallery-modal" class="modal" style="display:none;">
        <div class="modal-content gallery-modal-content">
            <span class="close-modal">&times;</span>
            <div id="gallery-carousel" class="gallery-carousel">
                <button id="gallery-prev" class="gallery-nav prev"><i class="fas fa-chevron-right"></i></button>
                <img id="gallery-img" src="" alt="معرض الصور">
                <button id="gallery-next" class="gallery-nav next"><i class="fas fa-chevron-left"></i></button>
            </div>
            <div class="gallery-caption" id="gallery-caption"></div>
        </div>
    </div>

    <script src="js/config.js?v=20260402"></script>
    <script src="js/auth.js?v=20260402"></script>
    <script src="js/api.js?v=20260402"></script>
    <script src="js/toast.js?v=20260402"></script>
    <script src="js/common.js?v=20260402"></script>
    <script src="js/manga-details-enhanced.js?v=20260402"></script>
</body>
</html>
